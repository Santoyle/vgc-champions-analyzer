name: Daily Meta Drift Check

on:
  schedule:
    # 06:30 UTC diario — 30 minutos después de daily-ingest (06:00 UTC)
    # para que los Parquets del día ya estén disponibles en el repo.
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      regulation_id:
        description: "Regulación a analizar (default: auto-detect)"
        required: false
        default: ""
      threshold:
        description: "P-value threshold (default: 0.05)"
        required: false
        default: "0.05"

# No cancelar un check en curso — igual que daily-ingest.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Solo lectura — este workflow no hace push.
permissions:
  contents: read

jobs:
  drift_check:
    name: Daily meta drift check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      # ── Step 1: Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step 2: Python 3.12 ─────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── Step 3: Dependencias ────────────────────────────────────────────
      # Solo las necesarias para drift check — no instalar streamlit,
      # deap ni xgboost. Esto mantiene el setup en ~30 s.
      - name: Install drift check dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install \
            "duckdb==1.3.2" \
            "pandas>=2.0" \
            "numpy>=1.26" \
            "pyarrow>=15.0" \
            "pydantic>=2.6" \
            "alibi-detect==0.12.0"

      # ── Step 4: Drift check ─────────────────────────────────────────────
      # Se escribe el script a /tmp/drift_check.py con un heredoc bash para
      # evitar problemas de indentación YAML con scripts Python multilínea.
      # El script siempre termina con sys.exit(0) — drift es información,
      # no un fallo del workflow.
      - name: Run drift check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REG_ID_OVERRIDE: ${{ github.event.inputs.regulation_id }}
          THRESHOLD: ${{ github.event.inputs.threshold }}
        shell: bash
        run: |
          cat > /tmp/drift_check.py << 'PYEOF'
          import sys
          import os
          import json
          import urllib.request
          sys.path.insert(0, '.')

          # ── Resolver regulación activa ────────────────────────────────
          reg_id = os.environ.get('REG_ID_OVERRIDE', '').strip()
          if not reg_id:
              try:
                  from src.app.core.regulation_active import get_active_regulation
                  active = get_active_regulation()
                  reg_id = active.regulation_id
                  print(f'Regulación activa detectada: {reg_id}')
              except Exception as e:
                  print(f'No se pudo detectar regulación activa: {e}')
                  print('Usando M-A como fallback')
                  reg_id = 'M-A'

          threshold_str = os.environ.get('THRESHOLD', '').strip()
          threshold = float(threshold_str) if threshold_str else 0.05
          print(f'Threshold: {threshold}')

          # ── Conectar DuckDB ───────────────────────────────────────────
          try:
              import duckdb
              con = duckdb.connect(':memory:')
              print('DuckDB conectado en memoria')
          except Exception as e:
              print(f'Error conectando DuckDB: {e}')
              sys.exit(0)

          # ── Ejecutar drift check ──────────────────────────────────────
          from src.app.modules.drift import check_drift, format_drift_for_discord

          result = check_drift(
              regulation_id=reg_id,
              con=con,
              threshold=threshold,
          )

          if result is None:
              print('Drift check sin datos suficientes — OK')
              sys.exit(0)

          print(
              f'p_val={result.p_val:.4f} '
              f'is_drift={result.is_drift} '
              f'distance={result.distance:.4f}'
          )
          print(f'Top drifted: {result.top_drifted_pokemon[:5]}')

          # ── Notificar Discord si hay drift ────────────────────────────
          webhook_url = os.environ.get('DISCORD_WEBHOOK_URL', '').strip()
          if result.is_drift and webhook_url:
              msg = format_drift_for_discord(result)
              run_url = (
                  'https://github.com/'
                  + os.environ.get('GITHUB_REPOSITORY', '')
                  + '/actions/runs/'
                  + os.environ.get('GITHUB_RUN_ID', '')
              )
              payload = {'content': msg + f'\n• Run: {run_url}'}
              try:
                  data = json.dumps(payload).encode('utf-8')
                  req = urllib.request.Request(
                      webhook_url,
                      data=data,
                      headers={'Content-Type': 'application/json'},
                      method='POST',
                  )
                  with urllib.request.urlopen(req) as resp:
                      print(f'Discord notificado: {resp.status}')
              except Exception as e:
                  print(f'Error notificando Discord (no critico): {e}')
          elif result.is_drift:
              print('DRIFT DETECTADO pero DISCORD_WEBHOOK_URL no configurado — solo log')
          else:
              print(f'Meta estable — p_val={result.p_val:.4f}')

          # Siempre exit 0 — drift es informacion, no fallo del workflow.
          sys.exit(0)
          PYEOF

          python /tmp/drift_check.py

      # ── Step 5: Alerta de fallo del workflow ─────────────────────────────
      # Se ejecuta SOLO si el job falla por error inesperado (timeout,
      # excepción no capturada, etc.). Detectar drift siempre termina
      # con exit 0, así que este step nunca se activa por un drift normal.
      - name: Discord notify on workflow failure
        if: failure()
        shell: bash
        run: |
          curl -s \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ drift-check workflow FAILED\nRepo: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
