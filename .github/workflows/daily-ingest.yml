name: Daily LIVE Ingestion

on:
  schedule:
    # 06:00 UTC diario — antes de que abra el mercado europeo de torneos
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Ejecución manual desde la UI de GitHub Actions con parámetros opcionales.
    # Inputs vacíos → el pipeline usa sus defaults (auto-detect regulación,
    # todas las fuentes, 50 replays).
    inputs:
      regulation_id:
        description: "Regulación a ingestar (default: auto-detect)"
        required: false
        default: ""
      sources:
        description: "Fuentes separadas por espacio (default: todas)"
        required: false
        default: ""
      max_replays:
        description: "Máximo de replays Showdown"
        required: false
        default: "50"

# No cancelar runs en progreso — si el cron anterior aún corre cuando
# empieza el de hoy, dejar que termine. cancel-in-progress: false evita
# perder datos escritos a mitad de un Parquet.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# contents: write es necesario para que data-bot pueda hacer git push.
# Sin este permiso el push fallaría con 403.
permissions:
  contents: write
  actions: read

jobs:
  ingest:
    name: Daily LIVE ingestion
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Step 1: Checkout con token para poder hacer push al final ──────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── Step 2: Python 3.12 con caché de pip ───────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── Step 3: Solo dependencias del pipeline de ingesta ───────────────
      # No instalar requirements.txt completo — evitar librerías ML pesadas
      # (deap, alibi-detect, xgboost, etc.) que no se necesitan aquí.
      # Esto reduce el tiempo de setup de ~5 min a ~30 s.
      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      # ── Step 4: Ejecutar pipeline de ingesta ───────────────────────────
      # Construir el comando dinámicamente según los inputs del
      # workflow_dispatch. Si los inputs están vacíos (run de cron),
      # el pipeline usa auto-detect de regulación y todas las fuentes.
      - name: Run live ingestion pipeline
        run: |
          CMD="python -m src.app.data.pipelines.live_ingest"

          # Agregar --reg solo si se especificó manualmente
          if [ -n "${{ github.event.inputs.regulation_id }}" ]; then
            CMD="$CMD --reg ${{ github.event.inputs.regulation_id }}"
          fi

          # Agregar --sources solo si se especificaron
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            CMD="$CMD --sources ${{ github.event.inputs.sources }}"
          fi

          # Agregar --max-replays solo si difiere del default
          MAX_REPLAYS="${{ github.event.inputs.max_replays }}"
          if [ -n "$MAX_REPLAYS" ] && [ "$MAX_REPLAYS" != "50" ]; then
            CMD="$CMD --max-replays $MAX_REPLAYS"
          fi

          echo "Ejecutando: $CMD"
          $CMD
        shell: bash

      # ── Step 5: Listar Parquets generados (siempre, incluso en fallo) ──
      # -newer data/raw lista solo archivos más recientes que el directorio
      # (recién creados en este run). || true evita fallo si data/raw/
      # no existe todavía (primer run del pipeline).
      - name: List generated Parquet files
        if: always()
        run: |
          echo "=== Parquets generados en data/raw/ ==="
          find data/raw -name "*.parquet" \
            -newer data/raw -type f \
            2>/dev/null | head -20 || \
            echo "No hay Parquets nuevos o data/raw/ no existe"
        shell: bash

      # ── Step 6: Commit y push de los datos si hay cambios ─────────────
      # [skip ci] en el mensaje es OBLIGATORIO — sin él, este push
      # dispararía validate-regulations.yml y otros workflows en cadena.
      # git add data/raw/ || true: seguro si data/raw/ no existe aún.
      - name: Commit and push ingested data
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@vgc-champions"
          git add data/raw/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios en data/raw/ — nada que commitear"
          else
            FECHA=$(date -u +"%Y-%m-%d")
            git commit -m "data: live ingest ${FECHA} [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "Push exitoso"
          fi
        shell: bash

      # ── Step 7: Notificación Discord solo en caso de fallo ────────────
      # || true garantiza que un error en la notificación (webhook caído,
      # secret no configurado) no marque el workflow completo como fallido.
      - name: Discord notify on failure
        if: failure()
        run: |
          curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"❌ daily-ingest FAILED\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
        shell: bash
