name: retrain-wp-weekly

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      regulation_id:
        description: "Regulación a reentrenar (default: auto-detect)"
        required: false
        default: ""
      force_save:
        description: "Guardar modelo aunque no pase el gate"
        required: false
        default: "false"
      use_synthetic:
        description: "Usar datos sintéticos (para testing)"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  retrain:
    name: Weekly WP model retrain
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install WP training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            duckdb==1.3.2 \
            pandas>=2.0 \
            numpy>=1.26 \
            pyarrow>=15.0 \
            pydantic>=2.6 \
            xgboost>=2.1 \
            scikit-learn>=1.5

      - name: Run WP retrain
        id: retrain
        run: |
          CMD="python scripts/train_wp.py"

          # Regulación específica o auto-detect
          if [ -n "${{ github.event.inputs.regulation_id }}" ]; then
            CMD="$CMD --reg ${{ github.event.inputs.regulation_id }}"
          fi

          # Datos sintéticos para testing
          if [ "${{ github.event.inputs.use_synthetic }}" = "true" ]; then
            CMD="$CMD --synthetic-data"
          fi

          # Nota: force_save se define como input para extensibilidad futura.
          # Actualmente train_wp.py gestiona gate internamente:
          # - exit 0: gate passed + model saved
          # - exit 1: gate failed or error
          # Este workflow traduce ese resultado a gate_passed true/false.

          echo "Ejecutando: $CMD"
          if $CMD; then
            echo "gate_passed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Gate pasado — modelo promovido"
          else
            echo "gate_passed=false" >> "$GITHUB_OUTPUT"
            echo "❌ Gate no pasado — modelo NO promovido"
          fi

          # Siempre exit 0: gate_fail no marca error técnico del workflow.
          exit 0
        shell: bash

      - name: Read model metrics
        id: metrics
        if: steps.retrain.outputs.gate_passed == 'true'
        run: |
          python -c "
          import glob, json, os, sys
          sys.path.insert(0, '.')

          patterns = ['models/wp/reg=*/current/metadata.json']
          found = []
          for p in patterns:
              found.extend(glob.glob(p))

          if not found:
              print('Sin metadata de modelo encontrada')
              raise SystemExit(0)

          latest = sorted(found)[-1]
          with open(latest, encoding='utf-8') as f:
              meta = json.load(f)

          auc = float(meta.get('auc', 0))
          brier = float(meta.get('brier', 1))
          n = int(meta.get('n_train', 0))
          reg = str(meta.get('regulation_id', '?'))
          ts = str(meta.get('trained_at', '?'))[:10]

          print(f'Regulación: {reg}')
          print(f'AUC:        {auc:.4f}')
          print(f'Brier:      {brier:.4f}')
          print(f'N train:    {n}')
          print(f'Fecha:      {ts}')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f'auc={auc:.4f}\n')
              out.write(f'brier={brier:.4f}\n')
              out.write(f'n_train={n}\n')
              out.write(f'regulation={reg}\n')
              out.write(f'trained_at={ts}\n')
          "
        shell: bash

      - name: Commit and push model
        if: steps.retrain.outputs.gate_passed == 'true'
        run: |
          git config user.name "retrain-bot"
          git config user.email "retrain-bot@vgc-champions"
          git add models/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios en models/ — nada que commitear"
          else
            DATE=$(date -u +"%Y-%m-%d")
            REG="${{ steps.metrics.outputs.regulation }}"
            AUC="${{ steps.metrics.outputs.auc }}"
            BRIER="${{ steps.metrics.outputs.brier }}"
            git commit -m "model: WP retrain ${DATE} reg=${REG} AUC=${AUC} Brier=${BRIER} [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "✅ Modelo commitado y pusheado"
          fi
        shell: bash

      - name: Discord notify — gate passed
        if: steps.retrain.outputs.gate_passed == 'true'
        run: |
          curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✅ **WP Model retrained** — ${{ steps.metrics.outputs.regulation }}\nAUC: ${{ steps.metrics.outputs.auc }} | Brier: ${{ steps.metrics.outputs.brier }}\nN train: ${{ steps.metrics.outputs.n_train }} | Fecha: ${{ steps.metrics.outputs.trained_at }}\nRepo: ${{ github.repository }}\"
            }" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
        shell: bash

      - name: Discord notify — gate failed
        if: steps.retrain.outputs.gate_passed == 'false'
        run: |
          curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"⚠️ **WP retrain gate FAILED** — modelo NO promovido\nPuede ser normal si hay pocos replays.\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
        shell: bash

      - name: Discord notify — workflow error
        if: failure()
        run: |
          curl -s \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"❌ **retrain-wp-weekly FAILED** (error técnico)\nRepo: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
        shell: bash
