name: dbt build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dbt_build:
    name: Run dbt build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dbt dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-duckdb

      - name: Run dbt build
        working-directory: dbt
        run: |
          dbt build --profiles-dir . --project-dir .
        env:
          DBT_DUCKDB_PATH: ":memory:"

      - name: Discord notify on failure
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ dbt-build FAILED\\nRepo: ${{ github.repository }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
